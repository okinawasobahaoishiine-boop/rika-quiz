<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>理科一問一答 最新プレビュー</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif;background:#f8fafc;color:#0f172a}button{touch-action:manipulation}.card{background:white;border:1px solid #e2e8f0;border-radius:24px;box-shadow:0 8px 24px rgba(15,23,42,.08)}.btn{border:1px solid #cbd5e1;border-radius:14px;padding:10px 12px;font-weight:700;background:white}.btn.on,.btn.main{background:#0f172a;color:white}.choice{min-height:44px;text-align:left;line-height:1.35}.picked{background:#e2e8f0;border-color:#64748b}@media(max-width:640px){.quiz-card{padding:12px!important}.quiz-title{font-size:20px!important}.quiz-sub,.small{font-size:12px!important}.question{padding:12px!important}.question p{font-size:17px!important;line-height:1.45!important}.choice{padding:8px 12px!important;font-size:14px!important}.gap-c{gap:8px!important}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const DATA=[
 ['中1','生物','A',1,'花のつくり','めしべの先端の部分を何というか。','柱頭',['子房','胚珠','やく']],
 ['中1','生物','B',1,'花のつくり','虫によって花粉が運ばれる花を何というか。','虫媒花',['風媒花','裸子植物','被子植物']],
 ['中2','化学','A',1,'化学変化と分解','もとの物質とは異なる別の物質ができる変化を何というか。','化学変化',['状態変化','物理変化','分解']],
 ['中2','化学','B',1,'化学変化と分解','炭酸水素ナトリウムを加熱したときに発生する気体を石灰水に通すと，石灰水はどうなるか。','白くにごる',['赤色になる','青色になる','変化しない']],
 ['中3','化学','A',1,'イオン','原子が電気を帯びたものを何というか。','イオン',['原子','分子','電子']],
 ['中3','化学','B',1,'イオンと電気分解','陽子1個がもつ＋の電気の量と電子1個がもつ－の電気の量は，「等しい」・「異なる」のどちらか。','等しい',['異なる','2倍','1/2倍']],
 ['中3','生物','A',1,'細胞分裂と生殖','1つの細胞が分かれて，2つの細胞になることを何というか。','細胞分裂',['受精','生殖','発生']],
 ['中3','生物','B',1,'細胞分裂と生殖','タマネギの根の細胞分裂のようすを観察するときに使用するのは，根の根元付近・先端付近のどちらか。','先端付近',['根元付近','中央付近','葉の裏']],
 ['中3','物理','A',1,'水圧/力の合成・分解','水の重さによって生じる圧力を何というか。','水圧',['浮力','重力','合力']],
 ['中3','物理','B',1,'水圧/力の合成・分解','水圧の大きさは，水の深さが深くなるほどどうなるか。','大きくなる',['小さくなる','変わらない','0になる']],
 ['中3','地学','A',1,'自転と日周運動','天体が，中心を通る軸を中心に自ら回転することを何というか。','自転',['公転','日周運動','年周運動']],
 ['中3','地学','B',1,'自転と日周運動','地球の自転の向きは，地軸を中心に，「東から西」・「西から東」のどちらか。','西から東',['東から西','北から南','南から北']]
].map(([grade,field,level,no,unit,question,answer,wrongs])=>({grade,field,level,no,unit,question,answer,wrongs,explanation:`正解は「${answer}」。`}));
const S='scienceQuizRecords',N='scienceQuizUserName',T='scienceQuizStreak';
let state={screen:'home',name:localStorage.getItem(N)||'',grade:'中3',field:'物理',level:'A',order:'number',qs:[],i:0,ans:{},hist:[],records:JSON.parse(localStorage.getItem(S)||'[]'),streak:JSON.parse(localStorage.getItem(T)||'{"lastDate":"","current":0,"best":0}'),start:0,sec:0,result:null};
let timer=null;
const $=s=>document.querySelector(s), shuffle=a=>[...a].sort(()=>Math.random()-.5), key=q=>`${q.grade}-${q.field}-${q.level}-${q.no}`, unit=q=>`${q.grade}${q.field}${q.level}`;
function save(){localStorage.setItem(S,JSON.stringify(state.records));localStorage.setItem(T,JSON.stringify(state.streak));}
function btns(items,val,setter){return `<div class="flex flex-wrap gap-2">${items.map(x=>`<button class="btn ${val===x?'on':''}" onclick="${setter}('${x}')">${x}</button>`).join('')}</div>`}
function tick(on){clearInterval(timer); if(on){state.start=Date.now();timer=setInterval(()=>{state.sec=Math.floor((Date.now()-state.start)/1000);render()},500)}}
function render(){
 const app=$('#app');
 if(state.screen==='home'){
  const filtered=DATA.filter(q=>(state.grade==='全学年'||q.grade===state.grade)&&(state.field==='全分野'||q.field===state.field)&&q.level===state.level);
  app.innerHTML=`<div class="min-h-screen flex items-center justify-center p-4"><div class="card w-full max-w-2xl p-6 space-y-5"><div class="text-center"><h1 class="text-3xl font-black">理科 一問一答</h1><p class="text-slate-500">最新版プレビュー</p></div><div><b>使用者名</b><input class="w-full border rounded-2xl px-4 py-3 mt-2" value="${state.name}" oninput="state.name=this.value;localStorage.setItem(N,this.value)"></div><div><b>学年</b>${btns(['全学年','中1','中2','中3'],state.grade,'setGrade')}</div><div><b>分野</b>${btns(['全分野','生物','化学','物理','地学'],state.field,'setField')}</div><div><b>問題</b>${btns(['A','B'],state.level,'setLevel')}</div><div class="bg-slate-100 rounded-2xl p-4 text-center"><div class="text-sm text-slate-500">出題予定</div><div class="text-3xl font-black">${filtered.length}問</div></div><div><b>出題順</b>${btns(['number','random'],state.order,'setOrder')}</div><div class="grid grid-cols-2 gap-3"><button class="btn main" onclick="startQuiz()">スタート</button><button class="btn" onclick="state.screen='records';render()">保存履歴</button></div></div></div>`;
 } else if(state.screen==='quiz'){
  const q=state.qs[state.i], picked=state.ans[key(q)]||'', choices=shuffle([q.answer,...q.wrongs]);
  app.innerHTML=`<div class="min-h-screen flex items-center justify-center p-3"><div class="card w-full max-w-3xl p-6 space-y-4 quiz-card"><div class="flex justify-between"><div><h1 class="text-2xl font-black quiz-title">理科 一問一答</h1><p class="text-sm text-slate-500 quiz-sub">${state.grade}・${state.field}・${state.level}問題</p></div><button class="btn" onclick="home()">ホーム</button></div><div class="flex justify-between small"><div><span class="bg-slate-100 rounded-xl px-2 py-1">${q.unit}</span> <span class="border rounded-xl px-2 py-1">第${q.no}問</span></div><div class="text-right">${state.i+1}/${state.qs.length}<br>${Math.floor(state.sec/60)}:${String(state.sec%60).padStart(2,'0')}</div></div><div class="border rounded-2xl p-5 question"><p class="text-xl font-bold">${q.question}</p></div><div class="grid grid-cols-1 sm:grid-cols-2 gap-3 gap-c">${choices.map(c=>`<button class="btn choice ${picked===c?'picked':''}" onclick="choose('${encodeURIComponent(c)}')">${c}</button>`).join('')}</div><div class="grid grid-cols-2 gap-3"><button class="btn" ${state.i===0?'disabled':''} onclick="prev()">前に戻る</button><button class="btn main" onclick="next()">${state.i+1>=state.qs.length?'採点する':'次に進む'}</button></div></div></div>`;
 } else if(state.screen==='result'){
  app.innerHTML=`<div class="min-h-screen flex items-center justify-center p-4"><div class="card w-full max-w-2xl p-6 space-y-5 text-center"><h1 class="text-3xl font-black">結果</h1><div class="text-5xl font-black">${state.result.score}/${state.result.total}</div><p class="text-orange-600 font-bold">${state.result.score===state.result.total?'🎆 さすが！おめでとう！':'よく頑張った！'}</p><p class="text-sm text-slate-500">結果は自動保存済み</p><button class="btn main w-full" onclick="home()">ホームへ戻る</button></div></div>`;
 } else if(state.screen==='records'){
  app.innerHTML=`<div class="min-h-screen flex items-center justify-center p-4"><div class="card w-full max-w-2xl p-6 space-y-4"><h1 class="text-2xl font-black">保存履歴</h1><p class="text-sm text-slate-500">Canvasプレビュー用の簡易表示</p>${state.records.slice(0,5).map(r=>`<div class="border rounded-xl p-3">${r.unit}：${r.score}/${r.total}</div>`).join('')||'<p>まだ履歴はありません。</p>'}<button class="btn main w-full" onclick="home()">ホームへ戻る</button></div></div>`;
 }
}
function setGrade(x){state.grade=x;render()}function setField(x){state.field=x;render()}function setLevel(x){state.level=x;render()}function setOrder(x){state.order=x;render()}function home(){tick(false);state.screen='home';render()}
function startQuiz(){let f=DATA.filter(q=>(state.grade==='全学年'||q.grade===state.grade)&&(state.field==='全分野'||q.field===state.field)&&q.level===state.level);if(!f.length){alert('この問題はまだ追加されていません');return}state.qs=(state.order==='random'?shuffle(f):f);state.i=0;state.ans={};state.sec=0;state.screen='quiz';tick(true);render()}
function choose(c){state.ans[key(state.qs[state.i])]=decodeURIComponent(c);next()}function next(){if(state.i+1<state.qs.length){state.i++;render()}else finish()}function prev(){if(state.i>0){state.i--;render()}}
function finish(){tick(false);let score=state.qs.filter(q=>state.ans[key(q)]===q.answer).length;state.result={score,total:state.qs.length};state.records.unshift({id:Date.now(),unit:unit(state.qs[0]),score,total:state.qs.length});save();state.screen='result';render()}
render();
</script>
</body>
</html>
