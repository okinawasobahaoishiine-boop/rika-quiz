 if(scr==="ready")return <Main><C><div className="text-center space-y-4"><h1 className="text-3xl font-bold">準備画面</h1><p>スタートを押すと始まります。</p><Box><div className="text-sm text-slate-500">問題数</div><div className="text-3xl font-black">{qs.length}問</div><div className="text-sm text-slate-500">目標時間：{tm(target)} / 全問正解ベスト：{bestPerfect?tm(bestPerfect):"まだなし"}</div></Box><div className="grid grid-cols-1 gap-3"><Btn onClick={()=>{setSec(0);setFinalSec(0);setStart(Date.now());setScr("quiz")}} kind="main">スタート</Btn><HomeLinks home={home}/></div></div></C></Main>;
 if(scr==="quiz")return <Main><C><div className="flex items-start justify-between gap-3"><div><h1 className="quiz-title text-2xl font-black">{quizType==="記述対策"?"理科 記述対策":"理科 一問一答"}</h1><p className="quiz-sub text-slate-500">{quizType==="記述対策"?`${grade||"中1"}・${field||"未選択"}・記述対策・${descLevels.join(" / ")}`:`${grade}・${field}・${level}問題`}</p></div><Btn onClick={()=>{setStart(null);home()}} className="quiz-home">理科ホームへ</Btn></div>{cur&&<><div className="quiz-info flex justify-between text-sm"><div><span className="quiz-badge rounded-xl bg-slate-100 px-3 py-1">{cur.unit}</span> <span className="quiz-badge rounded-xl border px-3 py-1">第{cur.no}問</span></div><div className="text-right"><div>進行 {i+1}/{qs.length}</div><div>回答済み {answered}/{qs.length}</div><b className={sec>target?"text-red-600":"text-sky-600"}>{tm(sec)} / 目標 {tm(target)}</b><div className="text-xs font-bold text-amber-700">全問正解ベスト {bestPerfect?tm(bestPerfect):"まだなし"}</div></div></div><Box className="quiz-question"><p className="text-xl font-bold leading-relaxed">{cur.question}</p></Box><div className="quiz-choice-grid grid grid-cols-1 sm:grid-cols-2 gap-3">{cur.choices.map(c=><Btn key={c} onClick={()=>choose(c)} kind={picked===c?"main":""} className="quiz-choice">{c}</Btn>)}</div><div className="quiz-nav grid grid-cols-2 gap-3"><Btn onClick={prev} disabled={i===0}>前に戻る</Btn>{(back||!picked||i+1>=qs.length)&&<Btn onClick={next} kind="main">{i+1>=qs.length?"採点する":"次に進む"}</Btn>}</div></>}</C></Main>;
 if(scr==="result"){const u=hist[0]?`${hist[0].grade}${hist[0].field}${hist[0].level||"A"}`:unit,rs=rec(records,u);return <Main><C><div className="space-y-3"><h1 className="text-2xl font-black">結果</h1><HomeLinks home={home}/></div>{result?.score===result?.total&&result?.total>0&&<><div className="fixed inset-0 pointer-events-none overflow-hidden z-50">{fw.map(p=><div key={p.id} className="absolute text-4xl animate-bounce" style={{left:p.left,top:p.top,animationDelay:p.delay}}>🎆</div>)}</div><Box><div className="text-5xl">🎉🎆🎊</div><div className="text-3xl font-black text-orange-600">さすが！おめでとう！</div><div className="font-bold text-yellow-700">満点すごい！！完璧！！💮</div></Box></>}<Box><div className="text-4xl font-black">{result?.score??0}/{result?.total??0}</div><div>正答率 {result?.total?Math.round(result.score/result.total*100):0}%</div><div className="text-xl font-bold text-orange-600">{result?.praise}</div><b className={finalSec>target?"text-red-600":"text-sky-600"}>時間 {tm(finalSec)} / 目標 {tm(target)}</b><div className="text-xs font-bold text-amber-700">全問正解ベスト {bestPerfect?tm(bestPerfect):"まだなし"}</div><div className="text-xs text-slate-500">{result?.saved===false?"復習モードのため保存履歴には反映されません":"結果は自動保存済み"}</div></Box><Box><b>{u}の過去5回</b><div className="text-xs text-slate-500">{det(u)}</div>{rs.length?<Row records={rs}/>:<p>まだ保存履歴はありません。</p>}</Box><div className="space-y-3"><h2 className="text-lg font-bold">全問題の結果</h2>{hist.map((a,n)=><div key={`${k(a)}-${n}`} className={`rounded-2xl p-4 border ${a.correct?"bg-sky-50 border-sky-200":"bg-red-50 border-red-200"}`}><div className="text-sm text-slate-500">第{a.no}問 {a.unit}</div><b>{a.question}</b><div>選んだ答え：<b className={a.correct?"text-sky-700":"text-red-700"}>{a.selected}</b></div><div>正しい答え：<b className="text-green-700">{a.answer}</b></div>{!a.correct&&<p className="text-sm">{a.explanation}</p>}</div>)}</div><div className="grid grid-cols-2 gap-3"><Btn onClick={begin} kind="main">もう一度やる</Btn><Btn onClick={review} disabled={!wrongs.length}>間違えた問題だけ復習</Btn></div></C></Main>}
 if(scr==="records"){const latest=scoped(records,rg,10),radarRecords=scoped(records,rg,3);return <Main><C><div className="space-y-3"><div><h1 className="text-2xl font-black">保存履歴</h1><p className="text-sm text-slate-500">レーダーは過去3回分、履歴は10回分まで表示</p></div><HomeLinks home={home}/></div><div><b>表示する学年</b><div className="grid grid-cols-4 gap-2">{analysisGrades.map(g=><Btn key={g} onClick={()=>setRg(g)} kind={rg===g?"main":""}>{g}</Btn>)}</div></div><Radar items={fieldStats(radarRecords,rg)} grade={rg}/>{!latest.length?<Box>この範囲の保存履歴はありません。</Box>:<div className="space-y-3"><Box><b>合計</b><Row records={latest}/></Box>{rg!=="全学年"&&uns(rg).map(u=><Box key={u}><b>{u}</b><div className="text-xs text-slate-500">{det(u)}</div><div className="grid grid-cols-5 gap-1">{latest.map(r=>{const x=mg(r,u);return x?<div key={`${r.id}-${u}`} className={`rounded-xl border px-1 py-2 text-center text-xs font-bold ${cls(Math.round(x.score/x.total*100))}`}>{lab(x.score,x.total)}</div>:<div key={`${r.id}-${u}`} className="rounded-xl border px-1 py-2 text-center text-xs text-slate-300">—</div>})}</div></Box>)}</div>}<Box><div className="text-sm text-slate-500">連続学習記録</div><div className="text-2xl font-black">🔥 {streak.current}日目</div><div className="text-xs text-slate-500">最長 {streak.best}日</div></Box></C></Main>}
 return null
}
function Main({children}){return <div className="min-h-screen flex items-center justify-center p-4 sm:p-6">{children}</div>}
function Box({children,className=""}){return <div className={`app-card rounded-2xl p-4 text-center space-y-2 ${className}`}>{children}</div>}

const root=document.getElementById("root");
if(ReactDOM.createRoot){
 ReactDOM.createRoot(root).render(<App/>);
}else{
 ReactDOM.render(<App/>,root);
}
</script>
</body>
</html>
